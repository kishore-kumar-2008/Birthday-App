<!DOCTYPE html>
<html>
<head>
    <title>Birthday Reminder</title>

    <!-- ✅ STEP 3: Manifest Link -->
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px;
            margin: 5px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #4CAF50;
            color: white;
        }

        .card {
            background: #eaeaea;
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            cursor: pointer;
            text-align: left;
        }

        .details {
            display: none;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎂 Birthday App</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="date" id="date">

    <select id="gender">
        <option value="">Gender</option>
        <option value="M">M</option>
        <option value="F">F</option>
    </select>

    <button onclick="addBirthday()">Add</button>

    <div id="list"></div>
</div>

<script>
    let birthdays = JSON.parse(localStorage.getItem("birthdays")) || {};

    function saveData() {
        localStorage.setItem("birthdays", JSON.stringify(birthdays));
    }

    function addBirthday() {
        let name = document.getElementById("name").value;
        let date = document.getElementById("date").value;
        let gender = document.getElementById("gender").value;

        if (!name || !date || !gender) {
            alert("Fill all fields");
            return;
        }

        birthdays[name] = {date: date, gender: gender};
        saveData();
        showList();

        document.getElementById("name").value = "";
        document.getElementById("date").value = "";
        document.getElementById("gender").value = "";
    }

    function calculateAge(dob) {
        let birthDate = new Date(dob);
        let today = new Date();

        let age = today.getFullYear() - birthDate.getFullYear();
        let m = today.getMonth() - birthDate.getMonth();

        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }

        return age;
    }

    function toggleDetails(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    function showList() {
        let listDiv = document.getElementById("list");
        listDiv.innerHTML = "";

        let count = 0;

        for (let name in birthdays) {
            let data = birthdays[name];
            let age = calculateAge(data.date);

            let dateObj = new Date(data.date);
            let formatted = dateObj.getDate().toString().padStart(2,'0') + "-" +
                            (dateObj.getMonth()+1).toString().padStart(2,'0') + "-" +
                            dateObj.getFullYear();

            let id = "details" + count;

            let card = `
                <div class="card" onclick="toggleDetails('${id}')">
                    <b>${name}</b>
                    <div class="details" id="${id}">
                        🎂 ${formatted}<br>
                        🎉 Age: ${age}
                    </div>
                </div>
            `;

            listDiv.innerHTML += card;
            count++;
        }
    }

    // 🔔 STEP 6: Notification Permission
    function requestNotificationPermission() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                console.log("Notification Permission:", permission);
            });
        }
    }

    // ⚙ STEP 5: Register Service Worker
    function registerServiceWorker() {
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js")
            .then(() => console.log("Service Worker Registered"))
            .catch(err => console.log("SW Error:", err));
        }
    }

    window.onload = function() {
        showList();
        requestNotificationPermission(); // STEP 6
        registerServiceWorker();         // STEP 5
    };
</script>

</body>
</html>
