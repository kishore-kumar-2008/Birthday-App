<!DOCTYPE html>
<html>
<head>
    <title>Birthday Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px;
            margin: 5px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            float: right;
            background: red;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .card {
            background: #eaeaea;
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            text-align: left;
        }

        .details {
            display: none;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎂 Birthday App</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="date" id="date">

    <select id="gender">
        <option value="">Gender</option>
        <option value="M">M</option>
        <option value="F">F</option>
    </select>

    <button onclick="addBirthday()">Add</button>

    <hr>

    <button onclick="showCategory('M')">👦 Boys</button>
    <button onclick="showCategory('F')">👧 Girls</button>

    <div id="list"></div>
</div>

<script>
let birthdays = JSON.parse(localStorage.getItem("birthdays")) || {};

function saveData() {
    localStorage.setItem("birthdays", JSON.stringify(birthdays));
}

// 🔔 Ask permission
function requestPermission() {
    if ("Notification" in window) {
        Notification.requestPermission();
    }
}

// 🔥 Gender validation
function checkGender(name, gender) {
    let lastChar = name.trim().toLowerCase().slice(-1);

    let femaleEnd = ["a", "i", "y"];
    let maleEnd = ["n", "r", "k", "t", "h", "s"];

    if (femaleEnd.includes(lastChar) && gender === "M") {
        alert("❌ Wrong entry! This looks like a female name.");
        return false;
    }

    if (maleEnd.includes(lastChar) && gender === "F") {
        alert("❌ Wrong entry! This looks like a male name.");
        return false;
    }

    return true;
}

function addBirthday() {
    let name = document.getElementById("name").value;
    let date = document.getElementById("date").value;
    let gender = document.getElementById("gender").value;

    if (!name || !date || !gender) {
        alert("Fill all fields");
        return;
    }

    if (!checkGender(name, gender)) return;

    birthdays[name] = {date: date, gender: gender};
    saveData();

    alert("Saved successfully!");

    document.getElementById("name").value = "";
    document.getElementById("date").value = "";
    document.getElementById("gender").value = "";
}

function calculateAge(dob) {
    let birthDate = new Date(dob);
    let today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();
    let m = today.getMonth() - birthDate.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }

    return age;
}

function toggleDetails(id) {
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

// ❌ Delete
function deletePerson(name) {
    if (confirm("Delete " + name + "?")) {
        delete birthdays[name];
        saveData();
        document.getElementById("list").innerHTML = "";
    }
}

// 👦👧 Show category
function showCategory(gender) {
    let listDiv = document.getElementById("list");
    listDiv.innerHTML = "";

    let count = 0;

    for (let name in birthdays) {
        let data = birthdays[name];

        if (data.gender !== gender) continue;

        let age = calculateAge(data.date);

        let dateObj = new Date(data.date);
        let formatted = dateObj.getDate().toString().padStart(2,'0') + "-" +
                        (dateObj.getMonth()+1).toString().padStart(2,'0') + "-" +
                        dateObj.getFullYear();

        let id = "details" + count;

        let card = `
            <div class="card">
                <b onclick="toggleDetails('${id}')">${name}</b>
                <button class="delete-btn" onclick="deletePerson('${name}')">❌</button>
                <div class="details" id="${id}">
                    🎂 ${formatted}<br>
                    🎉 Age: ${age}
                </div>
            </div>
        `;

        listDiv.innerHTML += card;
        count++;
    }
}

// 🔔 Notification reminder
function checkUpcomingBirthdays() {
    let today = new Date();

    for (let name in birthdays) {
        let dob = new Date(birthdays[name].date);

        let thisYearBirthday = new Date(
            today.getFullYear(),
            dob.getMonth(),
            dob.getDate()
        );

        let diff = Math.ceil((thisYearBirthday - today) / (1000 * 60 * 60 * 24));

        let message = "";

        if (diff === 0) {
            message = "🎉 Today is " + name + "'s Birthday!";
        } else if (diff === 1) {
            message = "⏰ Tomorrow is " + name + "'s Birthday!";
        }

        if (message !== "" && Notification.permission === "granted") {
            new Notification(message);
        }
    }
}

window.onload = function() {
    requestPermission();
    checkUpcomingBirthdays();
};
</script>

</body>
</html>
